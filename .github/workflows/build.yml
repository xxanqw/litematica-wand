name: Mod Build

on:
  workflow_dispatch:
    inputs:
      branches:
        description: 'Branches to build (comma-separated, e.g., main,1.20.1,1.21.4)'
        required: true
        default: 'fabric-multi'
        type: string

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Set matrix
        id: set-matrix
        run: |
          # Convert comma-separated branches to JSON array
          branches="${{ github.event.inputs.branches }}"
          echo "Input branches: $branches"
          
          # Remove spaces
          branches_clean=$(echo "$branches" | tr -d ' ')
          
          # Convert to JSON array using Python (more reliable)
          json_array=$(python3 -c "
          import json
          import sys
          branches = '$branches_clean'.split(',')
          branches = [b.strip() for b in branches if b.strip()]
          print(json.dumps(branches))
          ")
          
          echo "matrix=$json_array" >> $GITHUB_OUTPUT
          echo "Generated matrix: $json_array"

  build:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      matrix:
        branch: ${{ fromJson(needs.prepare.outputs.matrix) }}
      fail-fast: false

    steps:
      - name: Checkout specific branch
        uses: actions/checkout@v4
        with:
          ref: ${{ matrix.branch }}
          fetch-depth: 0

      - name: Verify branch checkout
        run: |
          echo "Current branch: $(git branch --show-current)"
          echo "Current commit: $(git rev-parse HEAD)"
          echo "Expected branch: ${{ matrix.branch }}"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x gradlew

      - name: Build Fabric
        run: ./gradlew build -Ploader=fabric

      - name: Build NeoForge
        run: ./gradlew build -Ploader=neoforge

      - name: Build Quilt
        run: ./gradlew build -Ploader=quilt

      - name: Collect and zip all artifacts
        run: |
          mkdir -p build/artifacts
          
          # Scan each modloader folder for built JARs
          for loader in fabric neoforge quilt; do
            loader_dir="versions/$loader"
            if [ -d "$loader_dir" ]; then
              echo "Scanning $loader_dir..."
              find "$loader_dir" -type f -path '*.jar' -exec cp -v {} build/artifacts/ \;
            fi
          done
          
          if [ -n "$(ls -A build/artifacts/*.jar 2>/dev/null)" ]; then
            cd build/artifacts
            zip build-artifacts.zip *.jar
            rm *.jar
            cd ../..
            echo "Created build-artifacts.zip"
            ls -lh build/artifacts
          else
            echo "No JAR files found!"
            exit 1
          fi

      - name: Archive built artifacts
        uses: christopherhx/gitea-upload-artifact@v4
        with:
          name: litematica-wand_build_artifacts
          path: build/artifacts/build-artifacts.zip
