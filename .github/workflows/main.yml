name: Mod Build

on:
  workflow_dispatch:
    inputs:
      branches:
        description: 'Branches to build (comma-separated, e.g., main,1.20.1,1.21.4)'
        required: true
        default: 'fabric-multi'
        type: string

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Set matrix
        id: set-matrix
        run: |
          # Convert comma-separated branches to JSON array
          branches="${{ github.event.inputs.branches }}"
          echo "Input branches: $branches"
          
          # Remove spaces
          branches_clean=$(echo "$branches" | tr -d ' ')
          
          # Convert to JSON array using Python (more reliable)
          json_array=$(python3 -c "
          import json
          import sys
          branches = '$branches_clean'.split(',')
          branches = [b.strip() for b in branches if b.strip()]
          print(json.dumps(branches))
          ")
          
          echo "matrix=$json_array" >> $GITHUB_OUTPUT
          echo "Generated matrix: $json_array"

  build:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      matrix:
        branch: ${{ fromJson(needs.prepare.outputs.matrix) }}
      fail-fast: false

    steps:
      - name: Checkout specific branch
        uses: actions/checkout@v4
        with:
          ref: ${{ matrix.branch }}
          fetch-depth: 0

      - name: Verify branch checkout
        run: |
          echo "Current branch: $(git branch --show-current)"
          echo "Current commit: $(git rev-parse HEAD)"
          echo "Expected branch: ${{ matrix.branch }}"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x gradlew

      - name: Build all versions
        run: ./gradlew build

      - name: Collect renamed artifacts
        run: |
          set -eo pipefail
          MOD_VERSION=$(grep '^mod.version=' gradle.properties | cut -d'=' -f2- | tr -d '\r')
          mkdir -p build/artifacts
          for version_dir in versions/*; do
            [ -d "$version_dir" ] || continue
            props_file="$version_dir/gradle.properties"
            [ -f "$props_file" ] || continue
            MC_TITLE=$(grep '^mod.mc_title=' "$props_file" | cut -d'=' -f2- | tr -d '\r')
            if [ -z "$MC_TITLE" ]; then
              MC_TITLE=$(basename "$version_dir")
            fi
            MC_TITLE=${MC_TITLE// /}
            libs_dir="$version_dir/build/libs"
            [ -d "$libs_dir" ] || continue
            for jar in "$libs_dir"/litematica_wand-"$MOD_VERSION"+*.jar; do
              [ -e "$jar" ] || continue
              base=$(basename "$jar")
              rest=${base#litematica_wand-$MOD_VERSION+}
              if [[ "$rest" == *"-sources.jar" ]]; then
                original_version=${rest%-sources.jar}
                suffix=${rest#"$original_version"}
              elif [[ "$rest" == *.jar ]]; then
                original_version=${rest%.jar}
                suffix=${rest#"$original_version"}
              else
                continue
              fi
              new_base="litematica_wand-${MOD_VERSION}+${MC_TITLE}${suffix}"
              cp "$jar" "build/artifacts/$new_base"
            done
          done
          ls -R build/artifacts

      - name: Archive built .jar
        uses: actions/upload-artifact@v4
        with:
          name: Build-${{ matrix.branch }}
          path: build/artifacts
